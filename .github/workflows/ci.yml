name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-sdk:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run SDK tests
        run: python -m pytest hiitl/ -v --tb=short

  conformance:
    name: Conformance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Python package
        run: cd python && pip install -e ".[dev]"
      - name: Install TypeScript deps
        run: cd typescript/packages/core && npm ci
      - name: Run Python conformance
        run: cd python && python -m pytest hiitl/core/tests/conformance/ -v --tb=short
      - name: Run TypeScript conformance
        run: cd typescript/packages/core && npx vitest run --reporter=verbose

  typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install core dependencies
        run: cd packages/core && npm ci
      - name: Install SDK dependencies
        run: cd packages/sdk && npm ci
      - name: Type check core
        run: cd packages/core && npx tsc --noEmit
      - name: Type check SDK
        run: cd packages/sdk && npx tsc --noEmit
      - name: Run core tests
        run: cd packages/core && npx vitest run --reporter=verbose
      - name: Run SDK tests
        run: cd packages/sdk && npx vitest run --reporter=verbose
