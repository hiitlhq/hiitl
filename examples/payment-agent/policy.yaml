version: "1.0.0"
name: payment_controls
rules:
  # Kill switch — block all payments if activated (highest priority)
  - name: payment_kill_switch
    priority: 1000
    enabled: false
    description: Emergency stop for all payment processing
    conditions:
      field: action
      operator: equals
      value: process_payment
    decision: KILL_SWITCH
    reason_code: PAYMENTS_SUSPENDED

  # Block payments over $10,000
  - name: block_very_large_payments
    priority: 900
    enabled: true
    description: Payments over $10,000 are not allowed
    conditions:
      all_of:
        - field: action
          operator: equals
          value: process_payment
        - field: parameters.amount
          operator: greater_than
          value: 10000
    decision: BLOCK
    reason_code: AMOUNT_EXCEEDS_MAXIMUM

  # Require approval for payments over $1,000
  - name: approve_large_payments
    priority: 800
    enabled: true
    description: Payments over $1,000 require human approval
    conditions:
      all_of:
        - field: action
          operator: equals
          value: process_payment
        - field: parameters.amount
          operator: greater_than
          value: 1000
    decision: REQUIRE_APPROVAL
    reason_code: LARGE_PAYMENT_REVIEW

  # Allow refunds under $500
  - name: allow_small_refunds
    priority: 500
    enabled: true
    description: Small refunds are automatically approved
    conditions:
      all_of:
        - field: action
          operator: equals
          value: issue_refund
        - field: parameters.amount
          operator: less_than_or_equal
          value: 500
    decision: ALLOW
    reason_code: SMALL_REFUND_ALLOWED

  # Allow normal payments (lowest priority — catch-all)
  - name: allow_payments
    priority: 100
    enabled: true
    description: Allow standard payment processing
    conditions:
      field: action
      operator: equals
      value: process_payment
    decision: ALLOW
    reason_code: PAYMENT_ALLOWED
