pattern_id: "communication/post_to_slack"
category: "communication"
name: "Post to Slack"
description: >
  Slack or team messaging platform posting action. Controls channel targeting,
  broadcast mention usage, rate limiting, and environment-aware sandboxing to
  prevent notification fatigue, accidental @channel mentions, and bot spam.
tags: ["slack", "communication", "messaging", "team"]

evaluate_examples:
  python: |
    result = hiitl.evaluate("post_to_slack", {
        "channel": "#engineering-alerts",
        "message_type": "notification",
        "mentions_count": 0,
    })
    if result.ok:
        slack_client.post_message(channel=channel, text=message)
  typescript: |
    const result = hiitl.evaluate({
      action: 'post_to_slack',
      params: {
        channel: '#engineering-alerts',
        message_type: 'notification',
        mentions_count: 0,
      },
    });
    if (result.ok) {
      await slackClient.postMessage({ channel, text: message });
    }

context_enrichment:
  - field: "user_id"
    why: "Identifies the user or agent posting for attribution and per-user rate limiting"
    example: "user_8xKp2mNq"
  - field: "target.channel"
    why: "Channel targeting determines notification scope and audience impact"
    example: "#engineering-alerts"
  - field: "parameters.has_broadcast_mention"
    why: "Messages with @channel, @here, or @everyone notify entire channels and require stricter controls"
    example: true
  - field: "agent_id"
    why: "Bot agents have separate rate limits and channel restrictions from human users"
    example: "incident-bot"

starter_policies:
  - name: "allow-normal-post"
    description: "Allow standard messages without broadcast mentions to permitted channels"
    priority: 500
    enabled: true
    conditions:
      all_of:
        - field: "parameters.mentions_count"
          operator: "less_than_or_equal"
          value: 5
        - field: "parameters.message_type"
          operator: "in"
          value: ["notification", "update", "reply"]
    decision: "ALLOW"
    reason_code: "SLACK_POST_ALLOWED"
    remediation:
      type: "static"
      message: "Slack post permitted under standard policy"
      suggestion: "No action required"

  - name: "block-broadcast-in-prod-channels"
    description: "Block @channel and @here mentions in production alert channels to prevent notification storms"
    priority: 100
    enabled: true
    conditions:
      all_of:
        - field: "parameters.has_broadcast_mention"
          operator: "equals"
          value: true
        - field: "target.channel"
          operator: "starts_with"
          value: "#prod-"
    decision: "BLOCK"
    reason_code: "SLACK_BROADCAST_BLOCKED_PROD"
    remediation:
      type: "static"
      message: "Broadcast mentions (@channel/@here) are blocked in production channels to prevent notification fatigue."
      suggestion: "Remove the @channel or @here mention from your message. If this is a genuine incident requiring broad notification, use the incident management tool instead, or request an exception from your team lead."

  - name: "rate-limit-per-agent"
    description: "Limit each agent to 60 messages per minute to prevent bot spam in channels"
    priority: 200
    enabled: true
    conditions:
      field: "agent_id"
      operator: "exists"
      value: true
    decision: "RATE_LIMIT"
    reason_code: "SLACK_RATE_LIMIT_AGENT"
    remediation:
      type: "static"
      message: "Slack posting rate limit exceeded for this agent. Maximum 60 messages per minute."
      suggestion: "Implement message batching or reduce posting frequency. Consider aggregating multiple updates into a single threaded message instead of separate posts."

  - name: "sandbox-in-dev"
    description: "Sandbox all Slack posts in dev environment to a dedicated test channel"
    priority: 80
    enabled: true
    conditions:
      field: "environment"
      operator: "equals"
      value: "dev"
    decision: "SANDBOX"
    reason_code: "SLACK_SANDBOXED_DEV"
    remediation:
      type: "static"
      message: "Slack posts in the dev environment are sandboxed to #dev-bot-testing to prevent messages reaching real channels."
      suggestion: "Your message will be redirected to #dev-bot-testing. To test against real channels, use the staging environment with appropriate approvals."

  - name: "require-approval-mass-mention"
    description: "Require approval for messages mentioning more than 10 users"
    priority: 130
    enabled: true
    conditions:
      field: "parameters.mentions_count"
      operator: "greater_than"
      value: 10
    decision: "REQUIRE_APPROVAL"
    reason_code: "SLACK_MASS_MENTION_APPROVAL"
    remediation:
      type: "static"
      message: "Messages mentioning more than 10 users require approval to prevent notification overload."
      suggestion: "Consider whether all mentioned users need direct notification. Reduce the mention count or submit for approval with justification for the broad notification."

remediation:
  block_message: "This Slack post was blocked by policy. Common causes include broadcast mentions in production channels or excessive user mentions. Check the reason_code for details."
  developer_action: "Review the decision response reason_codes. For broadcast blocks, remove @channel/@here mentions. For rate limits, batch messages or reduce frequency. For sandbox decisions, verify you are in the correct environment."
  approval_message: "This Slack post requires human approval before sending. Mass mentions or sensitive channel targeting triggered the approval requirement."

compliance:
  - regulation: "Internal Communication Policy"
    relevance: "Automated messages to team channels must follow organization communication guidelines"
    note: "Bot-generated messages should be clearly labeled as automated. Respect channel-specific posting guidelines and quiet hours where configured."
  - regulation: "Audit Trail Requirements"
    relevance: "All automated communications must be logged for accountability and incident review"
    note: "Every Slack post attempt (allowed, blocked, or sandboxed) is recorded in the ECP audit trail with the full message context, channel target, and decision rationale."
