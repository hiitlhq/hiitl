pattern_id: "financial/transfer_funds"
category: "financial"
name: "Transfer Funds"
description: >
  Fund transfers between accounts including internal transfers, external wire transfers,
  and cross-border payments. Transfers are high-risk irreversible actions that require
  strict controls for anti-money laundering, sanctions screening, and velocity monitoring
  to detect suspicious patterns.
tags: ["transfer", "financial", "money", "wire"]

evaluate_examples:
  python: |
    result = hiitl.evaluate("transfer_funds", {
        "amount": 5000.00,
        "from_account": "acct_K7mN3pR2qW",
        "to_account": "acct_X9hT4nL8vB",
        "currency": "usd",
    })
    if result.ok:
        transfer_funds(
            amount=5000.00,
            from_account="acct_K7mN3pR2qW",
            to_account="acct_X9hT4nL8vB",
            currency="usd",
        )
  typescript: |
    const result = hiitl.evaluate({
      action: 'transfer_funds',
      params: {
        amount: 5000.00,
        from_account: 'acct_K7mN3pR2qW',
        to_account: 'acct_X9hT4nL8vB',
        currency: 'usd',
      },
    });
    if (result.ok) {
      await transferFunds({
        amount: 5000.00,
        fromAccount: 'acct_K7mN3pR2qW',
        toAccount: 'acct_X9hT4nL8vB',
        currency: 'usd',
      });
    }

context_enrichment:
  - field: "user_id"
    why: "Identifies the initiator for audit attribution, per-user velocity limits, and fraud investigation"
    example: "user_2kN7mP3qR8"
  - field: "sensitivity"
    why: "Transfers are both monetary and irreversible — dual sensitivity tags trigger the strictest controls"
    example: "money,irreversible"
  - field: "parameters.transfer_type"
    why: "Internal vs. external vs. cross-border transfers have different risk profiles and regulatory requirements"
    example: "wire_domestic"
  - field: "target.destination_country"
    why: "Cross-border transfers require sanctions screening and may trigger additional AML reporting thresholds"
    example: "US"
  - field: "parameters.beneficiary_name"
    why: "Beneficiary information is required for wire transfers and enables sanctions list screening"
    example: "Acme Corp"

starter_policies:
  - name: "allow-internal-small-transfers"
    description: "Auto-approve small internal transfers under $5,000 between accounts within the same organization"
    priority: 200
    enabled: true
    conditions:
      all_of:
        - field: "action"
          operator: "equals"
          value: "transfer_funds"
        - field: "parameters.amount"
          operator: "less_than"
          value: 5000
    decision: "ALLOW"
    reason_code: "TRANSFER_AUTO_APPROVED"
    remediation:
      type: "static"
      message: "Transfer auto-approved (under $5,000 internal threshold)"
      suggestion: "No action needed"

  - name: "approve-large-transfers"
    description: "Require approval for transfers between $5,000 and $25,000"
    priority: 150
    enabled: true
    conditions:
      all_of:
        - field: "action"
          operator: "equals"
          value: "transfer_funds"
        - field: "parameters.amount"
          operator: "greater_than_or_equal"
          value: 5000
        - field: "parameters.amount"
          operator: "less_than_or_equal"
          value: 25000
    decision: "REQUIRE_APPROVAL"
    reason_code: "TRANSFER_NEEDS_APPROVAL"
    remediation:
      type: "static"
      message: "Transfers between $5,000 and $25,000 require treasury team approval"
      suggestion: "Submit this transfer for treasury review. Include the business justification and any supporting documentation such as vendor invoices or contract references."

  - name: "block-large-wire-transfers"
    description: "Block wire transfers over $25,000 — requires manual initiation through banking portal"
    priority: 100
    enabled: true
    conditions:
      all_of:
        - field: "action"
          operator: "equals"
          value: "transfer_funds"
        - field: "parameters.amount"
          operator: "greater_than"
          value: 25000
    decision: "BLOCK"
    reason_code: "TRANSFER_EXCEEDS_WIRE_LIMIT"
    remediation:
      type: "static"
      message: "Wire transfers over $25,000 cannot be initiated by automated agents"
      suggestion: "Large wire transfers must be initiated manually through the banking portal with dual authorization. Contact the treasury team to process this transfer."

  - name: "escalate-cross-border-transfers"
    description: "Escalate all cross-border transfers for compliance review regardless of amount"
    priority: 120
    enabled: true
    conditions:
      all_of:
        - field: "action"
          operator: "equals"
          value: "transfer_funds"
        - field: "parameters.currency"
          operator: "not_equals"
          value: "usd"
    decision: "ESCALATE"
    reason_code: "CROSS_BORDER_REVIEW_REQUIRED"
    remediation:
      type: "static"
      message: "Cross-border and foreign currency transfers require compliance team review for sanctions and AML screening"
      suggestion: "This transfer has been escalated to the compliance team. Ensure beneficiary details are complete and accurate. The compliance team will verify against sanctions lists before approving."

  - name: "velocity-limit-transfers"
    description: "Limit each agent to 10 transfers per hour to detect and prevent automated exfiltration"
    priority: 50
    enabled: true
    conditions:
      field: "action"
      operator: "equals"
      value: "transfer_funds"
    decision: "RATE_LIMIT"
    reason_code: "TRANSFER_VELOCITY_EXCEEDED"
    remediation:
      type: "static"
      message: "This agent has exceeded the maximum of 10 fund transfers per hour"
      suggestion: "Transfer velocity limits exist to prevent automated fund exfiltration. If legitimate batch transfers are needed, use the batch transfer workflow with explicit treasury authorization."

remediation:
  block_message: "This transfer was blocked because it exceeds the automated processing threshold for wire transfers. Large transfers require manual initiation with dual authorization to comply with banking controls and prevent unauthorized fund movement."
  developer_action: "For transfers under $25,000, submit for treasury approval. For larger amounts, initiate the transfer manually through the banking portal. If you need higher automated limits, contact the treasury and compliance teams."
  approval_message: "This fund transfer requires treasury team approval. The reviewer will see the full transfer details including source account, destination account, amount, currency, and beneficiary information."

compliance:
  - regulation: "AML/KYC"
    relevance: "Anti-money laundering regulations require monitoring of fund transfers for suspicious patterns including structuring, rapid movement, and unusual destinations"
    note: "Transfers above reporting thresholds (e.g., $10,000 in the US) must generate Currency Transaction Reports. The audit trail must capture all transfer attempts including blocked ones for SAR filing purposes."
  - regulation: "OFAC"
    relevance: "The Office of Foreign Assets Control requires screening of fund transfer beneficiaries against sanctions lists"
    note: "Cross-border transfers and transfers to new beneficiaries should be screened before execution. The escalation policy for foreign currency transfers supports this requirement."
  - regulation: "Wire Transfer Regulations (Regulation J / SWIFT)"
    relevance: "Wire transfers are subject to specific regulations governing authorization, record-keeping, and finality"
    note: "Wire transfers are irreversible once executed. The dual-authorization requirement for large transfers and the complete audit trail satisfy regulatory record-keeping requirements."
