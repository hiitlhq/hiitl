pattern_id: "iam/reset_password"
category: "iam"
name: "Reset Password"
description: >
  Password reset action covering self-service resets, admin-initiated resets, and
  programmatic credential rotation. Controls reset methods, rate limiting, and
  approval workflows to prevent account takeover, social engineering, and
  brute-force reset attacks.
tags: ["iam", "password", "authentication", "security"]

evaluate_examples:
  python: |
    result = hiitl.evaluate("reset_password", {
        "target_user": "user_5kMn9pLq",
        "method": "email",
    })
    if result.ok:
        auth_service.initiate_password_reset(user=target, method=method)
  typescript: |
    const result = hiitl.evaluate({
      action: 'reset_password',
      params: {
        target_user: 'user_5kMn9pLq',
        method: 'email',
      },
    });
    if (result.ok) {
      await authService.initiatePasswordReset({ user: target, method });
    }

context_enrichment:
  - field: "user_id"
    why: "Identifies who initiated the reset; critical for distinguishing self-service from admin-initiated resets"
    example: "user_8xKp2mNq"
  - field: "sensitivity"
    why: "Password resets are identity-sensitive operations that can lead to account takeover if abused"
    example: "identity"
  - field: "target.user"
    why: "The account being reset; needed for self-service detection and to prevent targeting privileged accounts"
    example: "user_5kMn9pLq"
  - field: "parameters.is_self_service"
    why: "Self-service resets (user resets own password) have different risk profiles than admin resets"
    example: true

starter_policies:
  - name: "allow-self-service-reset"
    description: "Allow users to reset their own password via standard email verification flow"
    priority: 500
    enabled: true
    conditions:
      all_of:
        - field: "parameters.method"
          operator: "equals"
          value: "email"
        - field: "parameters.is_self_service"
          operator: "equals"
          value: true
    decision: "ALLOW"
    reason_code: "PASSWORD_SELF_RESET_ALLOWED"
    remediation:
      type: "static"
      message: "Self-service password reset via email permitted"
      suggestion: "No action required"

  - name: "require-approval-admin-reset"
    description: "Require approval for admin-initiated password resets to prevent social engineering attacks"
    priority: 100
    enabled: true
    conditions:
      field: "parameters.method"
      operator: "equals"
      value: "admin"
    decision: "REQUIRE_APPROVAL"
    reason_code: "PASSWORD_ADMIN_RESET_APPROVAL_REQUIRED"
    remediation:
      type: "static"
      message: "Admin-initiated password resets require approval from a second administrator."
      suggestion: "Verify the identity of the person requesting the reset through an out-of-band channel (phone call, in-person). Submit for approval with the verification method used and the reason the user cannot perform a self-service reset."

  - name: "rate-limit-per-target"
    description: "Limit password reset attempts to 5 per hour per target account to prevent brute-force attacks"
    priority: 200
    enabled: true
    conditions:
      field: "parameters.target_user"
      operator: "exists"
      value: true
    decision: "RATE_LIMIT"
    reason_code: "PASSWORD_RESET_RATE_LIMIT"
    remediation:
      type: "static"
      message: "Password reset rate limit exceeded for this account. Maximum 5 reset attempts per hour."
      suggestion: "If the account holder is locked out, contact an administrator for a manual reset through the approval workflow. Repeated reset attempts may indicate a brute-force attack -- consider reviewing recent access logs."

  - name: "block-bulk-resets"
    description: "Block any process attempting to reset more than 3 passwords in rapid succession"
    priority: 60
    enabled: true
    conditions:
      field: "parameters.is_self_service"
      operator: "equals"
      value: false
    decision: "RATE_LIMIT"
    reason_code: "PASSWORD_BULK_RESET_BLOCKED"
    remediation:
      type: "static"
      message: "Bulk password reset rate limit applied. Non-self-service resets are limited to 3 per hour per agent."
      suggestion: "If you need to perform a bulk credential rotation, use the dedicated credential rotation workflow which requires pre-approval and has appropriate safeguards. Individual admin resets should be spaced out and each individually justified."

  - name: "escalate-privileged-account-reset"
    description: "Escalate password resets targeting admin or service accounts to the security team"
    priority: 70
    enabled: true
    conditions:
      field: "parameters.target_user"
      operator: "starts_with"
      value: "svc_"
    decision: "ESCALATE"
    reason_code: "PASSWORD_PRIVILEGED_RESET_ESCALATED"
    remediation:
      type: "static"
      message: "Password reset for service or privileged accounts has been escalated to the security team."
      suggestion: "Service account credential resets require security team involvement due to the potential impact on dependent systems. The security team will coordinate the reset with affected service owners."

remediation:
  block_message: "This password reset was blocked by policy. Common causes include rate limit violations, bulk reset detection, or targeting privileged accounts. Check the reason_code for details."
  developer_action: "Review the decision response reason_codes. For rate limits, the target account may be under attack -- review access logs. For admin resets, verify the requester's identity through out-of-band channels and submit for approval."
  approval_message: "This password reset requires human approval. Admin-initiated resets or resets targeting privileged accounts trigger the approval workflow to prevent social engineering attacks."

compliance:
  - regulation: "NIST SP 800-63B"
    relevance: "Digital identity guidelines specify requirements for credential reset and recovery"
    note: "Reset mechanisms must verify the claimant's identity before issuing new credentials. SMS-based reset is acceptable but email is preferred. Password hints and knowledge-based questions should not be used as the sole verification method."
  - regulation: "Authentication Standards"
    relevance: "Password reset flows are a common attack vector and must follow secure design principles"
    note: "Reset tokens must be single-use, time-limited, and transmitted over encrypted channels. Rate limiting on reset endpoints prevents enumeration and brute-force attacks. All reset attempts (successful and failed) must be logged."
  - regulation: "SOC 2 Type II"
    relevance: "Credential management is a key control area for SOC 2 audits"
    note: "Demonstrate that password resets require appropriate authorization, that privileged account resets have additional controls, and that all reset activity is logged with sufficient detail for forensic review."
